<!DOCTYPE html>
<html lang="en">
<head>
<script>
  (function() {
    if (localStorage.getItem('theme') === 'dark') document.documentElement.classList.add('dark-init');
  })();
</script>
<style>
  html.dark-init body { background: #0f1b2d !important; }
</style>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Salesforce Cert Exam Prep</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>

<!-- ═══════════════════════════════════════════════ SCREEN: START ══ -->
<div id="screen-start" class="screen active">
  <div style="position:fixed;top:0.75rem;right:1rem;display:flex;align-items:center;gap:0.75rem;z-index:50">
    <div id="user-chip-start" class="user-chip hidden"></div>
    <button class="dark-toggle" id="dark-toggle-start" title="Toggle dark mode">🌙</button>
  </div>
  <div class="card start-card">
    <div class="logo">☁️</div>
    <h1>Salesforce Cert Exam Prep</h1>
    <p class="subtitle">Certification Exam Practice</p>

    <div class="form-group">
      <label>Exam &amp; Question Set</label>
      <select id="select-set">
        <optgroup label="IAM Architect">
          <option value="set2">Set 2</option>
          <option value="set4">Set 4</option>
        </optgroup>
        <optgroup label="Integration Architect">
          <option value="int_set1">Set 1 (Sep 2022)</option>
          <option value="int_wi21">Wi21</option>
          <option value="int_set3">Set 3</option>
        </optgroup>
      </select>
    </div>

    <div class="form-group">
      <label>Mode</label>
      <div class="mode-toggle">
        <button class="mode-btn active" data-mode="practice">
          <span class="mode-icon">📚</span>
          <strong>Practice</strong>
          <small>See answer after each question</small>
        </button>
        <button class="mode-btn" data-mode="exam">
          <span class="mode-icon">⏱</span>
          <strong>Timed Exam</strong>
          <small>64 questions · 1h 32m</small>
        </button>
      </div>
    </div>

    <div class="form-group">
      <label>
        <input type="checkbox" id="chk-shuffle" checked />
        Shuffle questions
      </label>
    </div>

    <button id="btn-start" class="btn btn-primary btn-lg">Start</button>
    <button id="btn-history-start" class="btn btn-ghost btn-lg" style="margin-top:0.25rem;font-size:0.88rem">📋 My History</button>
  </div>
</div>

<!-- ═══════════════════════════════════════════════ SCREEN: EXAM ═══ -->
<div id="screen-exam" class="screen">
  <header class="exam-header">
    <div class="header-left">
      <span id="header-mode-label" class="mode-badge"></span>
      <span id="header-set-label" class="set-badge"></span>
    </div>
    <div class="header-center">
      <span id="progress-text">Q 1 / 64</span>
      <div class="progress-bar-wrap">
        <div id="progress-bar" class="progress-bar"></div>
      </div>
    </div>
    <div class="header-right">
      <div id="user-chip-exam" class="user-chip hidden"></div>
      <span id="timer-display" class="timer hidden">1:32:00</span>
      <button class="dark-toggle" id="dark-toggle-exam" title="Toggle dark mode">🌙</button>
      <button id="btn-quit" class="btn btn-ghost btn-sm">✕ Quit</button>
    </div>
  </header>

  <main class="exam-main">
    <div class="question-card">
      <div class="question-meta">
        <span id="q-number" class="q-number">Question 1</span>
        <span id="q-topic" class="q-topic"></span>
        <span id="q-type-badge" class="q-type-badge"></span>
      </div>
      <p id="q-text" class="q-text"></p>

      <div id="choices-list" class="choices-list"></div>

      <!-- Practice mode: show answer feedback inline -->
      <div id="feedback-box" class="feedback-box hidden"></div>

      <div class="question-actions">
        <!-- Exam mode only -->
        <button id="btn-flag" class="btn btn-ghost btn-sm hidden">🚩 Mark for Review</button>
        <!-- Both modes -->
        <button id="btn-check" class="btn btn-primary hidden">Check Answer</button>
        <button id="btn-next" class="btn btn-primary hidden">Next →</button>
        <!-- Exam mode final question -->
        <button id="btn-submit" class="btn btn-success hidden">Submit Exam</button>
      </div>
    </div>

    <!-- Exam mode: flagged questions nav -->
    <aside id="exam-nav" class="exam-nav hidden">
      <div class="nav-header">Question Map</div>
      <div id="nav-grid" class="nav-grid"></div>
      <button id="btn-go-submit" class="btn btn-success btn-block">Submit Exam</button>
    </aside>
  </main>
</div>

<!-- ══════════════════════════════════════════════ SCREEN: RESULTS ══ -->
<div id="screen-results" class="screen">
  <div style="position:fixed;top:0.75rem;right:1rem;display:flex;align-items:center;gap:0.75rem;z-index:50">
    <div id="user-chip-results" class="user-chip hidden"></div>
    <button class="dark-toggle" id="dark-toggle-results" title="Toggle dark mode">🌙</button>
  </div>
  <div class="results-card">
    <div id="result-verdict" class="result-verdict"></div>
    <h2 id="result-score" class="result-score"></h2>
    <p id="result-sub" class="result-sub"></p>

    <div id="topic-breakdown" class="topic-breakdown"></div>

    <div class="results-actions">
      <button id="btn-history" class="btn btn-outline">📋 My History</button>
      <button id="btn-review" class="btn btn-outline">Review Answers</button>
      <button id="btn-restart" class="btn btn-primary">Start Again</button>
    </div>
  </div>
</div>

<!-- ══════════════════════════════════════════════ SCREEN: REVIEW ═══ -->
<div id="screen-review" class="screen">
  <header class="review-header">
    <h2>Answer Review</h2>
    <div style="display:flex;align-items:center;gap:0.75rem">
      <button class="dark-toggle" id="dark-toggle-review" title="Toggle dark mode">🌙</button>
      <button id="btn-back-results" class="btn btn-ghost btn-sm">← Back to Results</button>
    </div>
  </header>
  <div id="review-list" class="review-list"></div>
</div>

<!-- ══════════════════════════════════════════════ AUTH MODAL ═════ -->
<div id="modal-auth" class="modal-overlay hidden">
  <div class="modal-card">
    <div class="logo" style="font-size:2rem;text-align:center;margin-bottom:0.5rem">☁️</div>
    <h2 style="text-align:center;font-size:1.1rem;color:var(--sf-dark);margin-bottom:1.25rem">Salesforce IAM Architect</h2>
    <div class="modal-tabs">
      <button class="modal-tab active" id="tab-login" onclick="switchTab('login')">Login</button>
      <button class="modal-tab" id="tab-register" onclick="switchTab('register')">Register</button>
    </div>
    <div id="modal-error" class="modal-error"></div>
    <div class="modal-field">
      <label>Username</label>
      <input type="text" id="auth-username" autocomplete="username" placeholder="Enter username" />
    </div>
    <div class="modal-field">
      <label>Password</label>
      <input type="password" id="auth-password" autocomplete="current-password" placeholder="Enter password" />
    </div>
    <div class="modal-field" id="field-confirm" style="display:none">
      <label>Confirm Password</label>
      <input type="password" id="auth-confirm" autocomplete="new-password" placeholder="Confirm password" />
    </div>
    <button id="btn-auth-submit" class="btn btn-primary btn-lg" style="margin-top:0.25rem">Login</button>
  </div>
</div>

<!-- ══════════════════════════════════════════════ SCREEN: HISTORY ══ -->
<div id="screen-history" class="screen">
  <header class="history-header">
    <h2>My History</h2>
    <div style="display:flex;align-items:center;gap:0.75rem">
      <button class="dark-toggle" id="dark-toggle-history" title="Toggle dark mode">🌙</button>
      <button id="btn-back-from-history" class="btn btn-ghost btn-sm">← Back</button>
    </div>
  </header>
  <div class="history-list">
    <div id="history-content"></div>
  </div>
</div>

<script src="js/app.js"></script>
</body>
</html>
